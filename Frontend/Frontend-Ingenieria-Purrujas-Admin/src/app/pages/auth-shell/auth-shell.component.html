<section class="auth-shell">
  <div class="ambient ambient-one" aria-hidden="true"></div>
  <div class="ambient ambient-two" aria-hidden="true"></div>

  <div class="shell-grid">
    <aside class="brand-panel">
      <div class="brand-overlay" aria-hidden="true"></div>
      <div class="brand-glow" aria-hidden="true"></div>

      <div class="brand-content">
        <p class="eyebrow">Hotel Las Purrujas</p>
        <h1>Acceso administrativo</h1>
        <div class="brand-note">
          <span>Área privada</span>
          <p>Reservada para la gestión interna y el personal autorizado.</p>
        </div>
      </div>
    </aside>

    <section class="form-panel">
      <div class="panel-top">
        <div class="panel-heading">
          <p class="form-kicker">Área interna</p>
          <h2>Iniciar sesión</h2>
        </div>
      </div>

      @if (errorMessage()) {
        <p class="feedback error">{{ errorMessage() }}</p>
      }

      <form class="auth-form" [formGroup]="loginForm" (ngSubmit)="submitLogin()">
        <label class="field">
          <span>Nombre de usuario</span>
          <input
            type="text"
            formControlName="username"
            autocomplete="username"
            maxlength="50"
            placeholder="Ingrese su usuario" />
          @if (hasLoginError('username')) {
            <small>Use entre 4 y 50 caracteres válidos: letras, números, punto, guion o guion bajo.</small>
          }
        </label>

        <label class="field">
          <span>Contraseña</span>
          <input
            type="password"
            formControlName="password"
            autocomplete="current-password"
            maxlength="255"
            placeholder="Ingrese su contraseña" />
          @if (hasLoginError('password')) {
            <small>La contraseña debe tener entre 8 y 255 caracteres.</small>
          }
        </label>

        <button class="submit-button" type="submit" [disabled]="submitting()">
          {{ submitting() ? 'Ingresando...' : 'Entrar' }}
        </button>
      </form>

      <div class="panel-footer">
        <p>Acceso reservado exclusivamente para administradores autenticados.</p>
      </div>
    </section>
  </div>
</section>
