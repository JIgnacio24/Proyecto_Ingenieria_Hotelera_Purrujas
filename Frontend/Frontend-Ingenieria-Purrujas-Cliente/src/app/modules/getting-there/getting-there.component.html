<section
  id="como-llegar"
  class="section section-como-llegar"
  [class.section-como-llegar--home]="variant() === 'home'"
  [class.section-como-llegar--about]="variant() === 'about'"
>
  <div class="container">
    <div class="section-header">
      <span class="section-tag">{{ gettingThereContent.sectionTag }}</span>
      <h2 class="section-title centered">{{ gettingThereContent.sectionTitle }}</h2>
      <p class="section-subtext">{{ gettingThereContent.sectionSubtext }}</p>
    </div>
    <div
      class="map-card"
      [class.map-card--home]="variant() === 'home'"
      [class.map-card--about]="variant() === 'about'"
    >
      <div class="map-text">
        <h3>{{ gettingThereContent.coordinatesTitle }}</h3>
        <p>{{ gettingThereContent.coordinatesDescription }}</p>
        <ul>
          <li *ngFor="let item of gettingThereContent.directionsItems">{{ item }}</li>
        </ul>
        <a
          class="map-button"
          [class.map-button--home]="variant() === 'home'"
          [class.map-button--about]="variant() === 'about'"
          href="https://maps.app.goo.gl/N7oWPu6m2tAaNHhy9"
          target="_blank"
          rel="noopener"
        >
          {{ gettingThereContent.mapButtonLabel }}
        </a>
      </div>
      <div
        class="map-embed"
        [class.map-embed--home]="variant() === 'home'"
        [class.map-embed--about]="variant() === 'about'"
      >
        <div class="map-embed">
          <iframe
            src="https://www.google.com/maps?q=9.975878207007307,-83.770258333651&z=18&output=embed"
            width="100%"
            height="100%"
            style="border: 0"
            allowfullscreen=""
            loading="lazy"
          >
          </iframe>
        </div>
      </div>
    </div>
  </div>
</section>
